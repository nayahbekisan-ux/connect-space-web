<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Post | Connect Space</title>
  <style>
    /* --- CUTE & COZY THEME --- */
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

    body {
      font-family: 'Nunito', sans-serif;
      background-color: #fdfaf5; /* Warm cream */
      color: #5d574f;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 650px;
      margin: 30px auto;
      background: white;
      padding: 30px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(140, 120, 81, 0.05);
      border: 1px solid #f0e6d8;
    }

    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 25px;
    }

    .logo-circle {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 15px;
      box-shadow: 0 4px 10px rgba(163, 177, 138, 0.3);
    }

    .back-btn {
      background: transparent;
      border: 1px solid #eaddcf;
      color: #a69080;
      padding: 8px 15px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.2s;
      margin-right: auto;
    }
    .back-btn:hover {
      background-color: #fdf0d5;
      color: #8c7851;
    }

    /* --- INPUT STYLES --- */
    textarea {
      width: 100%;
      height: 140px;
      border: 2px solid #f0e6d8;
      border-radius: 20px;
      padding: 15px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      color: #5d574f;
      resize: none;
      margin-bottom: 15px;
      transition: border-color 0.3s;
      box-sizing: border-box;
      outline: none;
    }
    textarea:focus {
      border-color: #a3b18a;
    }

    .attachment-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 25px;
    }

    .attachment-btn {
      background: #fdfaf5;
      border: 1px solid #eaddcf;
      color: #8c7851;
      padding: 10px 18px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .attachment-btn:hover {
      background: #a3b18a;
      color: white;
      border-color: #a3b18a;
    }

    /* --- ACTION BUTTONS --- */
    .actions {
      display: flex;
      gap: 12px;
    }

    .post-btn {
      flex: 1;
      border: none;
      padding: 14px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 800;
      font-size: 16px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .post-btn.primary {
      background-color: #a3b18a;
      color: white;
      box-shadow: 0 4px 0px #84936e;
    }
    .post-btn.primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 7px 0px #84936e;
    }

    .post-btn.anonymous {
      background-color: #fdf0d5;
      color: #bc6c25;
      box-shadow: 0 4px 0px #eaddcf;
    }
    .post-btn.anonymous:hover {
      transform: translateY(-3px);
      box-shadow: 0 7px 0px #eaddcf;
    }

    /* --- FEED STYLES --- */
    .feed { margin-top: 40px; }
    
    .post {
      background: white;
      padding: 25px;
      margin-bottom: 20px;
      border-radius: 25px;
      border: 1px solid #f0e6d8;
      box-shadow: 0 4px 15px rgba(140, 120, 81, 0.03);
      position: relative;
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post strong {
      color: #bc6c25;
      font-weight: 800;
    }

    .post .meta {
      font-size: 13px;
      color: #a69080;
      margin-top: 15px;
      font-style: italic;
    }

    .delete-btn {
      background: #fdf0d5;
      color: #bc6c25;
      border: none;
      padding: 5px 12px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      position: absolute;
      top: 20px;
      right: 20px;
    }
    .delete-btn:hover { background: #fee4b3; }

    .preview-area img, .preview-area video {
      max-width: 100%;
      border-radius: 20px;
      margin-top: 10px;
      border: 3px solid #fdfaf5;
    }

    /* --- NEW POST INTERACTION STYLES --- */
    .post-interactions {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px dashed #f0e6d8;
    }

    .interaction-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: #8c7851;
      font-family: inherit;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 12px;
      transition: all 0.2s;
    }

    .interaction-item:hover {
      background-color: #fdfaf5;
      color: #a3b18a;
    }

    .interaction-item.liked {
      color: #e63946;
    }

    .interaction-item.liked svg {
      fill: #e63946;
    }

    .interaction-item svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="post-header">
      <button class="back-btn" onclick="history.back()">← Back</button>
      <img src="https://cms-assets.tutsplus.com/cdn-cgi/image/width=360/uploads/users/107/posts/109117/image-upload/24_Totoro_ellipse_nails.jpg" alt="CS Logo" class="logo-circle">
    </div>

    <textarea id="postText" placeholder="Share a thought, a win, or just say hi... ✨"></textarea>

    <div class="attachment-options">
      <button class="attachment-btn" onclick="document.getElementById('photo-input').click()">📸 Photo</button>
      <button class="attachment-btn" onclick="document.getElementById('video-input').click()">🎥 Video</button>
      <button class="attachment-btn" onclick="addFeeling()">☁️ Feeling</button>
      <input type="file" id="photo-input" accept="image/*" style="display:none">
      <input type="file" id="video-input" accept="video/*" style="display:none">
    </div>

    <div class="preview-area" id="preview" style="display:none; margin-bottom: 20px;"></div>

    <div class="actions">
      <button class="post-btn anonymous" onclick="submitPost(true)">Post Anonymously</button>
      <button class="post-btn primary" onclick="submitPost(false)">Post as Me</button>
    </div>

    <div class="feed" id="feed"></div>
  </div>

  <script>
    const photoInput = document.getElementById('photo-input');
    const videoInput = document.getElementById('video-input');
    const previewArea = document.getElementById('preview');
    const feed = document.getElementById('feed');

    photoInput.addEventListener('change', function(e) {
      previewArea.style.display = 'block';
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          previewArea.innerHTML = `<img src="${event.target.result}">`;
        }
        reader.readAsDataURL(file);
      }
    });

    videoInput.addEventListener('change', function(e) {
      previewArea.style.display = 'block';
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          previewArea.innerHTML = `<video controls><source src="${event.target.result}"></video>`;
        }
        reader.readAsDataURL(file);
      }
    });

    function addFeeling() {
      const feelings = ["✨ positive", "🌿 calm", "🚀 inspired", "😴 sleepy", "🌻 happy", "💪 motivated"];
      const currentText = document.getElementById('postText').value;
      const randomFeeling = feelings[Math.floor(Math.random() * feelings.length)];
      document.getElementById('postText').value = currentText + " — feeling " + randomFeeling;
    }

    function submitPost(isAnonymous) {
      const text = document.getElementById('postText').value.trim();
      const attachment = previewArea.innerHTML;

      if (!text && !attachment) {
        return;
      }

      const post = {
        id: Date.now(),
        content: text,
        anonymous: isAnonymous,
        likes: 0,
        liked: false,
        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + " · " + new Date().toLocaleDateString(),
        attachment: attachment
      };

      let posts = JSON.parse(localStorage.getItem("connectPosts")) || [];
      posts.unshift(post);
      localStorage.setItem("connectPosts", JSON.stringify(posts));

      // Reset
      document.getElementById('postText').value = '';
      previewArea.style.display = 'none';
      previewArea.innerHTML = '';
      renderFeed();
    }

    function deletePost(id) {
      let posts = JSON.parse(localStorage.getItem("connectPosts")) || [];
      posts = posts.filter(post => post.id !== id);
      localStorage.setItem("connectPosts", JSON.stringify(posts));
      renderFeed();
    }

    function handleLike(id) {
      let posts = JSON.parse(localStorage.getItem("connectPosts")) || [];
      const post = posts.find(p => p.id === id);
      if (post) {
        post.liked = !post.liked;
        post.likes = post.liked ? post.likes + 1 : post.likes - 1;
        localStorage.setItem("connectPosts", JSON.stringify(posts));
        renderFeed();
      }
    }

    function handleShare(id) {
      const post = JSON.parse(localStorage.getItem("connectPosts")).find(p => p.id === id);
      const shareData = {
        title: 'Connect Space Post',
        text: post.content,
        url: window.location.href
      };
      
      try {
        if (navigator.share) {
          navigator.share(shareData);
        } else {
          const tempInput = document.createElement('input');
          document.body.appendChild(tempInput);
          tempInput.value = `Checkout this post on Connect Space: "${post.content}"`;
          tempInput.select();
          document.execCommand('copy');
          document.body.removeChild(tempInput);
          
          const shareBtn = document.querySelector(`[data-share-id="${id}"]`);
          const originalText = shareBtn.innerHTML;
          shareBtn.innerHTML = "Copied! ✨";
          setTimeout(() => shareBtn.innerHTML = originalText, 2000);
        }
      } catch (err) {
        console.error('Error sharing:', err);
      }
    }

    function renderFeed() {
      feed.innerHTML = '';
      const posts = JSON.parse(localStorage.getItem("connectPosts")) || [];
      
      if (posts.length === 0) {
        feed.innerHTML = "<p style='text-align:center; color:#a69080;'>Your feed is quiet... be the first to post! ☁️</p>";
        return;
      }

      posts.forEach(post => {
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
          <button class="delete-btn" onclick="deletePost(${post.id})">Remove</button>
          <p><strong>${post.anonymous ? "👤 Someone kind" : "✨ You"}</strong></p>
          <p>${post.content}</p>
          ${post.attachment || ""}
          <div class="post-interactions">
            <button class="interaction-item ${post.liked ? 'liked' : ''}" onclick="handleLike(${post.id})">
              <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
              <span>${post.likes || 0}</span>
            </button>
            <button class="interaction-item" onclick="document.getElementById('postText').focus()">
              <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
              <span>Comment</span>
            </button>
            <button class="interaction-item" data-share-id="${post.id}" onclick="handleShare(${post.id})">
              <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
              <span>Share</span>
            </button>
          </div>
          <div class="meta">${post.timestamp}</div>
        `;
        feed.appendChild(div);
      });
    }

    renderFeed();
  </script>
</body>
</html>
