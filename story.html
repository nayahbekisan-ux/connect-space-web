<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Post | Connect Space</title>
  <style>
    /* --- CUTE & COZY THEME --- */
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');

    body {
      font-family: 'Nunito', sans-serif;
      background-color: #fdfaf5; /* Warm cream */
      color: #5d574f;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 650px;
      margin: 30px auto;
      background: white;
      padding: 30px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(140, 120, 81, 0.05);
      border: 1px solid #f0e6d8;
    }

    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 25px;
    }

    .logo-circle {
      width: 45px;
      height: 45px;
      background-color: #a3b18a; /* Sage Green */
      border-radius: 15px; /* Squircle */
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      margin-right: 15px;
      box-shadow: 0 4px 10px rgba(163, 177, 138, 0.3);
    }

    .back-btn {
      background: transparent;
      border: 1px solid #eaddcf;
      color: #a69080;
      padding: 8px 15px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.2s;
      margin-right: auto;
    }
    .back-btn:hover {
      background-color: #fdf0d5;
      color: #8c7851;
    }

    /* --- INPUT STYLES --- */
    textarea {
      width: 100%;
      height: 140px;
      border: 2px solid #f0e6d8;
      border-radius: 20px;
      padding: 15px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      color: #5d574f;
      resize: none;
      margin-bottom: 15px;
      transition: border-color 0.3s;
      box-sizing: border-box;
      outline: none;
    }
    textarea:focus {
      border-color: #a3b18a;
    }

    .attachment-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 25px;
    }

    .attachment-btn {
      background: #fdfaf5;
      border: 1px solid #eaddcf;
      color: #8c7851;
      padding: 10px 18px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .attachment-btn:hover {
      background: #a3b18a;
      color: white;
      border-color: #a3b18a;
    }

    /* --- ACTION BUTTONS --- */
    .actions {
      display: flex;
      gap: 12px;
    }

    .post-btn {
      flex: 1;
      border: none;
      padding: 14px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 800;
      font-size: 16px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .post-btn.primary {
      background-color: #a3b18a;
      color: white;
      box-shadow: 0 4px 0px #84936e;
    }
    .post-btn.primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 7px 0px #84936e;
    }

    .post-btn.anonymous {
      background-color: #fdf0d5;
      color: #bc6c25; /* Terracotta */
      box-shadow: 0 4px 0px #eaddcf;
    }
    .post-btn.anonymous:hover {
      transform: translateY(-3px);
      box-shadow: 0 7px 0px #eaddcf;
    }

    /* --- FEED STYLES --- */
    .feed { margin-top: 40px; }
    
    .post {
      background: white;
      padding: 25px;
      margin-bottom: 20px;
      border-radius: 25px;
      border: 1px solid #f0e6d8;
      box-shadow: 0 4px 15px rgba(140, 120, 81, 0.03);
      position: relative;
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post strong {
      color: #bc6c25;
      font-weight: 800;
    }

    .post .meta {
      font-size: 13px;
      color: #a69080;
      margin-top: 15px;
      font-style: italic;
    }

    .delete-btn {
      background: #fdf0d5;
      color: #bc6c25;
      border: none;
      padding: 5px 12px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      position: absolute;
      top: 20px;
      right: 20px;
    }
    .delete-btn:hover { background: #fee4b3; }

    .preview-area img, .preview-area video {
      max-width: 100%;
      border-radius: 20px;
      margin-top: 10px;
      border: 3px solid #fdfaf5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="post-header">
      <button class="back-btn" onclick="history.back()">← Back</button>
      <div class="logo-circle">CS</div>
    </div>

    <textarea id="postText" placeholder="Share a thought, a win, or just say hi... ✨"></textarea>

    <div class="attachment-options">
      <button class="attachment-btn" onclick="document.getElementById('photo-input').click()">📸 Photo</button>
      <button class="attachment-btn" onclick="document.getElementById('video-input').click()">🎥 Video</button>
      <button class="attachment-btn">☁️ Feeling</button>
      <input type="file" id="photo-input" accept="image/*" style="display:none">
      <input type="file" id="video-input" accept="video/*" style="display:none">
    </div>

    <div class="preview-area" id="preview" style="display:none; margin-bottom: 20px;"></div>

    <div class="actions">
      <button class="post-btn anonymous" onclick="submitPost(true)">Post Privately</button>
      <button class="post-btn primary" onclick="submitPost(false)">Share with Community</button>
    </div>

    <div class="feed" id="feed"></div>
  </div>

  <script>
    const photoInput = document.getElementById('photo-input');
    const videoInput = document.getElementById('video-input');
    const previewArea = document.getElementById('preview');
    const feed = document.getElementById('feed');

    photoInput.addEventListener('change', function(e) {
      previewArea.style.display = 'block';
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          previewArea.innerHTML = `<img src="${event.target.result}">`;
        }
        reader.readAsDataURL(file);
      }
    });

    videoInput.addEventListener('change', function(e) {
      previewArea.style.display = 'block';
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          previewArea.innerHTML = `<video controls><source src="${event.target.result}"></video>`;
        }
        reader.readAsDataURL(file);
      }
    });

    function submitPost(isAnonymous) {
      const text = document.getElementById('postText').value.trim();
      const attachment = previewArea.innerHTML;

      if (!text && !attachment) {
        alert("Your post is empty! Share a little something. ✨");
        return;
      }

      const post = {
        id: Date.now(),
        content: text,
        anonymous: isAnonymous,
        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + " · " + new Date().toLocaleDateString(),
        attachment: attachment
      };

      let posts = JSON.parse(localStorage.getItem("connectPosts")) || [];
      posts.unshift(post);
      localStorage.setItem("connectPosts", JSON.stringify(posts));

      // Reset
      document.getElementById('postText').value = '';
      previewArea.style.display = 'none';
      previewArea.innerHTML = '';
      renderFeed();
    }

    function deletePost(id) {
      let posts = JSON.parse(localStorage.getItem("connectPosts")) || [];
      posts = posts.filter(post => post.id !== id);
      localStorage.setItem("connectPosts", JSON.stringify(posts));
      renderFeed();
    }

    function renderFeed() {
      feed.innerHTML = '';
      const posts = JSON.parse(localStorage.getItem("connectPosts")) || [];
      
      if (posts.length === 0) {
        feed.innerHTML = "<p style='text-align:center; color:#a69080;'>Your feed is quiet... be the first to post! ☁️</p>";
        return;
      }

      posts.forEach(post => {
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
          <button class="delete-btn" onclick="deletePost(${post.id})">Remove</button>
          <p><strong>${post.anonymous ? "👤 Someone kind" : "✨ You"}</strong></p>
          <p>${post.content}</p>
          ${post.attachment || ""}
          <div class="meta">${post.timestamp}</div>
        `;
        feed.appendChild(div);
      });
    }

    renderFeed();
  </script>
</body>
</html>
