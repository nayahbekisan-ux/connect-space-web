<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Space - Your Cozy Wellness Hub</title>
    <style>
        /* --- CUTE & COZY THEME --- */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');

        :root {
            --primary: #a3b18a;
            --primary-dark: #84936e;
            --primary-light: #b5c49c;
            --bg: #fdfaf5;
            --text: #5d574f;
            --accent: #8c7851;
            --header-bg: #f3e9dc;
            --danger: #e07a5f;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 15px;
        }

        /* --- RESPONSIVE HEADER --- */
        header {
            text-align: center;
            padding: 40px 20px;
            background-color: var(--header-bg);
            border-radius: 30px;
            margin-bottom: 30px;
            position: relative;
            border: 2px dashed #eaddcf;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header-content {
            z-index: 1;
        }

        h1 {
            color: var(--accent);
            font-size: clamp(2rem, 8vw, 3.5rem); /* Fluid typography */
            margin: 0;
            font-weight: 800;
            line-height: 1.1;
        }

        .tagline {
            color: #a69080;
            font-style: italic;
            font-size: 1.1em;
            margin-top: 10px;
        }

        /* --- AUTH & PROFILE UI --- */
        /* Moved from absolute to relative/flex for better flow on mobile */
        .auth-controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
        }

        /* Profile Area */
        .profile-container {
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .profile-container.show {
            display: flex;
        }

        .profile-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s;
            object-fit: cover;
        }

        .profile-img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Desktop specific positioning */
        @media (min-width: 768px) {
            header {
                padding: 60px 40px;
                flex-direction: row;
                justify-content: space-between;
                text-align: left;
            }
            .header-content {
                flex: 1;
            }
            .auth-controls {
                width: auto;
            }
            .profile-container {
                align-items: flex-end;
            }
        }

        /* --- BUTTONS --- */
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0px var(--primary-dark);
            white-space: nowrap;
        }

        button:hover {
            transform: translateY(-2px);
            background-color: var(--primary-light);
            box-shadow: 0 6px 0px var(--primary-dark);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0px var(--primary-dark);
        }

        .logout-btn {
            background-color: var(--danger);
            box-shadow: 0 3px 0px #c96a50;
            padding: 6px 14px;
            font-size: 12px;
        }
        .logout-btn:hover { background-color: #f28482; box-shadow: 0 4px 0px #c96a50; }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(93, 87, 79, 0.6);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #fff;
            margin: 15vh auto;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            border-radius: 30px;
            border: 6px solid var(--header-bg);
            position: relative;
            box-sizing: border-box;
        }

        .modal-content input {
            width: 100%;
            padding: 14px;
            margin: 10px 0 20px 0;
            border: 2px solid #f0e6d8;
            border-radius: 15px;
            font-family: 'Nunito', sans-serif;
            outline: none;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* Content Sections */
        .features-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .feature {
            background-color: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(93, 87, 79, 0.05);
            border: 1px solid #f0e6d8;
        }

        .mood-tracker {
            background: #fdf0d5; 
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            border: 2px dashed #f1dca7;
        }

        .mood-options {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 15px;
        }

        .mood-options button {
            font-size: 28px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 60px;
            height: 60px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .planner-section {
            background: white;
            padding: 30px;
            border-radius: 30px;
            border: 1px solid #f0e6d8;
            text-align: center;
        }

        .planner-img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .habit-checklist {
            font-weight: 600;
            accent-color: var(--primary);
            text-align: left;
            display: inline-block;
            margin-top: 10px;
        }
        
        .habit-checklist label {
            display: block;
            margin-bottom: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Connect Space</h1>
                <p class="tagline">Your cute pathway to wellness ✨</p>
            </div>

            <div class="auth-controls">
                <!-- AUTH BUTTONS -->
                <div class="auth-buttons" id="authButtonsContainer">
                    <button onclick="openModal('signinModal')">Sign In</button>
                    <button onclick="openModal('signupModal')">Sign Up</button>
                </div>

                <!-- PROFILE CONTAINER -->
                <div class="profile-container" id="profileBtn">
                    <img src="https://cms-assets.tutsplus.com/cdn-cgi/image/width=360/uploads/users/107/posts/109117/image-upload/24_Totoro_ellipse_nails.jpg" 
                         alt="Profile" 
                         class="profile-img" 
                         onclick="window.location.href='profile.html'">
                    <button class="logout-btn" onclick="handleLogout()">Log Out</button>
                </div>
            </div>
        </header>

        <!-- SIGN IN MODAL -->
        <div id="signinModal" class="modal">
            <div class="modal-content">
                <span style="float:right; cursor:pointer; font-size:28px;" onclick="closeModal('signinModal')">&times;</span>
                <h3>Welcome Back! ☁️</h3>
                <form onsubmit="event.preventDefault(); handleLogin();">
                    <label>Email</label>
                    <input type="email" placeholder="hello@bestie.com" required>
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                    <button type="submit" style="width:100%;">Let's Go!</button>
                </form>
            </div>
        </div>

        <!-- SIGN UP MODAL -->
        <div id="signupModal" class="modal">
            <div class="modal-content">
                <span style="float:right; cursor:pointer; font-size:28px;" onclick="closeModal('signupModal')">&times;</span>
                <h3>Join the Club! 🌸</h3>
                <form onsubmit="event.preventDefault(); handleLogin();">
                    <label>Username</label>
                    <input type="text" placeholder="WellnessWitch" required>
                    <label>Email</label>
                    <input type="email" placeholder="hello@bestie.com" required>
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                    <button type="submit" style="width:100%;">Create Account</button>
                </form>
            </div>
        </div>

        <div class="features-section">
            <div class="features-grid" style="display: grid; gap: 20px;">
                <div class="feature">
                    <button style="width:100%;" onclick="window.location.href='story.html'">📝 Share Your Story</button>
                </div>
                <div class="feature">
                    <button style="width:100%;" onclick="window.location.href='articles.html'">📚 Explore Articles</button>
                </div>
                <div class="feature">
                    <button style="width:100%;" onclick="window.location.href='community.html'">🫂 Join Community</button>
                </div>
            </div>

            <div class="mood-tracker">
                <h3>How are you, Bestie?</h3>
                <div class="mood-options">
                    <button onclick="setMood('😊 Happy')">😊</button>
                    <button onclick="setMood('😐 Neutral')">😐</button>
                    <button onclick="setMood('😔 Sad')">😔</button>
                    <button onclick="setMood('😤 Stressed')">😤</button>
                </div>
                <div id="moodResult" style="margin-top:20px; font-weight:800; color:#bc6c25;"></div>
            </div>
        </div>

        <div class="planner-section">
            <h2>Daily Glow-Up Habits</h2>
            <img src="https://www.makerstations.io/content/images/2022/03/olja-lobkis-studygram-04.jpeg" class="planner-img" alt="Planner">
            <div class="habit-checklist">
                <label><input type="checkbox"> Drink water 💧</label>
                <label><input type="checkbox"> Meditate 🧘</label>
                <label><input type="checkbox"> Stretch 🌸</label>
                <label><input type="checkbox"> 8 hrs of sleep 😴</label>
                <label><input type="checkbox"> Read my favorite book 📕</label>
            </div>
            <div style="margin-top:25px;"><button>🔔 Set Reminders</button></div>
        </div>
    </div>

    <script>
        const authContainer = document.getElementById('authButtonsContainer');
        const profileBtn = document.getElementById('profileBtn');

        window.onload = function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn === 'true') {
                showProfileUI();
            }
        };

        function showProfileUI() {
            authContainer.style.display = 'none';
            profileBtn.classList.add('show');
        }

        function handleLogin() {
            localStorage.setItem('isLoggedIn', 'true');
            closeModal('signinModal');
            closeModal('signupModal');
            showProfileUI();
        }

        function handleLogout() {
            localStorage.removeItem('isLoggedIn');
            location.reload();
        }

        function openModal(id) {
            document.getElementById(id).style.display = 'block';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function setMood(mood) {
            document.getElementById('moodResult').textContent = "Current Vibe: " + mood;
        }

        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = "none";
            }
        }
    </script>
</body>
</html>
