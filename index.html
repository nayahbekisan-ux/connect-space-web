<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Space - Your Cozy Wellness Hub</title>
    <style>
        /* --- CUTE & COZY THEME --- */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fdfaf5; 
            color: #5d574f;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 50px 0;
            background-color: #f3e9dc;
            border-radius: 25px;
            margin-bottom: 30px;
            position: relative;
            border: 2px dashed #eaddcf;
        }

        h1 {
            color: #8c7851;
            font-size: 3em;
            margin-top: 0;
            font-weight: 800;
        }

        .tagline {
            color: #a69080;
            font-style: italic;
            font-size: 1.1em;
        }

        /* --- CUTE BUTTONS --- */
        button {
            background-color: #a3b18a;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0px #84936e;
        }

        button:hover {
            transform: translateY(-2px);
            background-color: #b5c49c;
            box-shadow: 0 6px 0px #84936e;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0px #84936e;
        }

        .auth-buttons {
            position: absolute;
            top: 25px;
            right: 30px;
            display: flex;
            gap: 10px;
        }

        .auth-buttons button {
            padding: 8px 18px;
            font-size: 13px;
        }

        .profile-button {
            position: absolute;
            top: 25px;
            right: 30px;
            display: none; 
        }

        .profile-button.show {
            display: block;
        }

        .profile-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #fdfaf5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .profile-img:hover {
            transform: rotate(10deg) scale(1.1);
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(93, 87, 79, 0.4);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: #fff;
            margin: 10% auto;
            padding: 35px;
            width: 90%;
            max-width: 380px;
            border-radius: 30px;
            border: 4px solid #f3e9dc;
            position: relative;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 2px solid #f0e6d8;
            border-radius: 15px;
            font-family: 'Nunito', sans-serif;
            outline: none;
            box-sizing: border-box;
        }

        /* Layout Sections */
        .features-section {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            margin-bottom: 30px;
        }

        .features {
            flex: 1;
            min-width: 300px;
            display: grid;
            gap: 20px;
        }

        .feature {
            background-color: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(93, 87, 79, 0.05);
            border: 1px solid #f0e6d8;
        }

        /* --- UPDATED MOOD TRACKER STYLES --- */
        .mood-tracker {
            flex: 1;
            min-width: 300px;
            background: #fdf0d5; 
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            border: 2px dashed #f1dca7;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .mood-options {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        .mood-options button {
            font-size: 24px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 55px;
            height: 55px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mood-result {
            font-weight: 800;
            color: #8c7851;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .mood-motivation {
            font-style: italic;
            color: #5d574f;
            font-size: 0.95em;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .mood-stats {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 12px;
            font-size: 0.85em;
            color: #8c7851;
            border: 1px solid #f1dca7;
        }

        /* Planner */
        .planner-section {
            background: white;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid #f0e6d8;
            text-align: center;
        }

        .planner-img {
            max-width: 100%;
            height: auto;
            width: 450px;
            border-radius: 20px;
            filter: sepia(10%);
        }

        .habit-checklist {
            font-weight: 600;
            accent-color: #a3b18a;
            text-align: left;
            display: inline-block;
            margin-top: 20px;
        }
        
        .logout-btn {
            background-color: #e07a5f;
            box-shadow: 0 4px 0px #c96a50;
            margin-top: 10px;
        }
        .logout-btn:hover { background-color: #f28482; box-shadow: 0 6px 0px #c96a50; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Connect Space</h1>
            <p class="tagline">Your cute pathway to wellness ✨</p>

            <div class="auth-buttons" id="authButtonsContainer">
                <button onclick="openModal('signinModal')">Sign In</button>
                <button onclick="openModal('signupModal')">Sign Up</button>
            </div>

            <div class="profile-button" id="profileBtn">
                <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 5px;">
                    <img src="https://cms-assets.tutsplus.com/cdn-cgi/image/width=360/uploads/users/107/posts/109117/image-upload/24_Totoro_ellipse_nails.jpg" 
                         alt="Profile" 
                         class="profile-img" 
                         onclick="window.location.href='profile.html'">
                    <button class="logout-btn" style="padding: 4px 10px; font-size: 10px;" onclick="handleLogout()">Log Out</button>
                </div>
            </div>
        </header>

        <div id="signinModal" class="modal">
            <div class="modal-content">
                <span style="float:right; cursor:pointer; font-size:24px;" onclick="closeModal('signinModal')">&times;</span>
                <h3>Welcome Back! ☁️</h3>
                <form onsubmit="event.preventDefault(); handleLogin();">
                    <label>Email</label><input type="email" required>
                    <label>Password</label><input type="password" required>
                    <button type="submit" style="width:100%; margin-top:10px;">Let's Go!</button>
                </form>
            </div>
        </div>

        <div id="signupModal" class="modal">
            <div class="modal-content">
                <span style="float:right; cursor:pointer; font-size:24px;" onclick="closeModal('signupModal')">&times;</span>
                <h3>Join the Club! 🌸</h3>
                <form onsubmit="event.preventDefault(); handleLogin();">
                    <label>Username</label><input type="text" required>
                    <label>Email</label><input type="email" required>
                    <label>Password</label><input type="password" required>
                    <button type="submit" style="width:100%; margin-top:10px;">Create Account</button>
                </form>
            </div>
        </div>

        <div class="features-section">
            <div class="features">
                <div class="feature">
                    <a href="story.html"><button style="width:100%;">📝 Share Your Story</button></a>
                </div>
                <div class="feature">
                    <a href="articles.html"><button style="width:100%;">📚 Explore Articles</button></a>
                </div>
                <div class="feature">
                    <a href="community.html"><button style="width:100%;">🫂 Join Community</button></a>
                </div>
            </div>

            <div class="mood-tracker">
                <h3>How are you, Bestie?</h3>
                <div class="mood-options">
                    <button onclick="setMood('Happy')">😊</button>
                    <button onclick="setMood('Neutral')">😐</button>
                    <button onclick="setMood('Sad')">😔</button>
                    <button onclick="setMood('Stressed')">😤</button>
                </div>
                <div id="moodDisplayArea" style="display:none;">
                    <div class="mood-result" id="moodResult"></div>
                    <div class="mood-motivation" id="moodMotivation"></div>
                    <div class="mood-stats" id="moodStats"></div>
                </div>
            </div>
        </div>

        <div class="planner-section">
            <h2>Daily Glow-Up Habits</h2>
            <img src="https://www.makerstations.io/content/images/2022/03/olja-lobkis-studygram-04.jpeg" class="planner-img" alt="Planner">
            <div class="habit-checklist">
                <label><input type="checkbox"> Drink water 💧</label><br>
                <label><input type="checkbox"> Meditate 🧘</label><br>
                <label><input type="checkbox"> Stretch 🌸</label><br>
                <label><input type="checkbox"> 8 hrs of sleep 😴</label><br>
                <label><input type="checkbox"> Read my favorite book 📕</label>
            </div>
            <div style="margin-top:25px;"><button>🔔 Set Reminders</button></div>
        </div>

        <script>
            // State
            const authContainer = document.getElementById('authButtonsContainer');
            const profileBtn = document.getElementById('profileBtn');
            
            // Mood Logic Constants
            const quotes = {
                'Happy': "Your smile makes the world brighter! Spread that magic, bestie. ✨",
                'Neutral': "A calm heart is a creative heart. Enjoy the peace of today. 🌿",
                'Sad': "It's okay to feel rainy. Remember, flowers need rain to grow. 🌧️💖",
                'Stressed': "Inhale peace, exhale worry. You are stronger than this moment. ☁️"
            };

            // Initial Mock Data for Statistics
            let weeklyMoods = ['Happy', 'Happy', 'Neutral', 'Happy', 'Neutral', 'Stressed'];

            window.onload = function() {
                const isLoggedIn = localStorage.getItem('isLoggedIn');
                if (isLoggedIn === 'true') {
                    showProfileUI();
                }
            };

            function showProfileUI() {
                authContainer.style.display = 'none';
                profileBtn.classList.add('show');
            }

            function handleLogin() {
                localStorage.setItem('isLoggedIn', 'true');
                closeModal('signinModal');
                closeModal('signupModal');
                showProfileUI();
            }

            function handleLogout() {
                localStorage.removeItem('isLoggedIn');
                location.reload();
            }

            function openModal(id) {
                document.getElementById(id).style.display = 'block';
            }

            function closeModal(id) {
                document.getElementById(id).style.display = 'none';
            }

            function setMood(mood) {
                // Add to history
                weeklyMoods.push(mood);
                if(weeklyMoods.length > 7) weeklyMoods.shift(); // Keep last 7

                // Update UI
                const displayArea = document.getElementById('moodDisplayArea');
                const result = document.getElementById('moodResult');
                const motivation = document.getElementById('moodMotivation');
                const stats = document.getElementById('moodStats');

                displayArea.style.display = 'block';
                result.textContent = "Today's Vibe: " + mood;
                motivation.textContent = quotes[mood];

                // Calculate Statistics
                const counts = {};
                weeklyMoods.forEach(m => counts[m] = (counts[m] || 0) + 1);
                
                // Find most frequent mood
                let mostCommon = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                let percentage = Math.round((counts['Happy'] || 0) / weeklyMoods.length * 100);

                stats.innerHTML = `📊 <strong>Weekly Vibe:</strong> Most common mood: ${mostCommon}. <br> You've been Happy ${percentage}% of the week!`;
            }

            window.onclick = function(event) {
                if (event.target.className === 'modal') {
                    event.target.style.display = "none";
                }
            }
        </script>
    </div>
</body>
</html>
