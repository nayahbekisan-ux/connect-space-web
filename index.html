<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Space - Your Wellness Hub</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0;
            background-color: #e6f7ff;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        h1 {
            color: #2a6496;
            font-size: 2.5em;
        }
        .tagline {
            color: #5a8bb5;
            font-style: italic;
        }
        /* Flex layout for features + mood tracker */
        .features-section {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            align-items: flex-start;
        }
        .features {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .feature {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .feature:hover {
            transform: translateY(-5px);
        }
        .feature h3 {
            color: #2a6496;
            margin-top: 0;
        }
        button {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #3a7bc8;
        }
        /* Mood tracker styles */
        .mood-tracker {
            flex: 1;
            background: #e6f7ff;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .mood-tracker h3 {
            margin-top: 0;
            color: #2a6496;
        }
        .mood-options {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }
        .mood-options button {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .mood-options button:hover {
            transform: scale(1.2);
        }
        .mood-result {
            margin-top: 15px;
            font-weight: bold;
            color: #4a90e2;
        }
        .planner-section {
            text-align: center;
            margin: 40px 0;
        }
        .planner-img {
            width: 450px;
            height: 310px;
            border-radius: 9px;
            box-shadow: 0 4px 9px rgba(0,0,0,0.1);
        }
        a {
  text-decoration: none;
  color: inherit;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Connect Space</h1>
            <p class="tagline">Your pathway to wellness and connection</p>
        </header>

        <!-- Features + Mood Tracker side by side -->
        <div class="features-section">
            <div class="features">
              <div class="feature">
      <button onclick="window.location.href='story.html'">📝Share Your Story</button>
                </div>

                <div class="feature">
                    <button> onclick="window.location.href='articles.html'">📚Explore Articles</button>
                </div>
                
                <div class="feature">
                    <button> onclick="window.location.href='community.html'">🫂Join Community</button>
                </div>

            <div class="mood-tracker">
                <h3>Track Your Mood</h3>
                <p>Hi Bestie! How are you feeling today?</p>
                <div class="mood-options">
                    <button onclick="setMood('😊 Happy')">😊</button>
                    <button onclick="setMood('😐 Neutral')">😐</button>
                    <button onclick="setMood('😔 Sad')">😔</button>
                    <button onclick="setMood('😤 Stressed')">😤</button>
                </div>
                <div class="mood-result" id="moodResult"></div>
            </div>
        </div>

<div class="planner-section">
  <h2>Daily Habit Reminders</h2>
  <img src="https://www.makerstations.io/content/images/2022/03/olja-lobkis-studygram-04.jpeg" 
       alt="Planner notebook" class="planner-img">

  <!-- Checklist -->
  <div class="habit-checklist" style="text-align:left; margin-top:15px;">
    <label><input type="checkbox"> Drink 8 glasses of water</label><br>
    <label><input type="checkbox"> Meditate for 10 minutes</label><br>
    <label><input type="checkbox"> Exercise / stretch</label><br>
    <label><input type="checkbox"> Write in journal</label><br>
    <label><input type="checkbox"> Sleep 7–8 hours</label>
  </div>

  <div style="margin-top: 10px; text-align:center;">
    <button>🔔 Set Up Reminders</button>
  </div>
</div>

    <script>
        // Simple hover effect enhancement
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mouseover', function() {
                this.style.boxShadow = '0 2px 5px rgba(0,0,0,0.2)';
            });
            button.addEventListener('mouseout', function() {
                this.style.boxShadow = 'none';
            });
        });

        // Mood tracker function
        function setMood(mood) {
            document.getElementById('moodResult').textContent = "You selected: " + mood;
        }
    </script>
</body>
</html>
