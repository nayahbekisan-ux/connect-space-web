<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Space - Your Cozy Wellness Hub</title>
    <style>
        /* --- CUTE & COZY THEME --- */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');

        :root {
            --primary: #a3b18a;
            --primary-dark: #84936e;
            --primary-light: #b5c49c;
            --bg: #fdfaf5;
            --text: #5d574f;
            --accent: #8c7851;
            --header-bg: #f3e9dc;
            --danger: #e07a5f;
            --card-shadow: 0 10px 30px rgba(93, 87, 79, 0.05);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 15px;
        }

        /* --- RESPONSIVE HEADER --- */
        header {
            text-align: center;
            padding: 40px 20px;
            background-color: var(--header-bg);
            border-radius: 30px;
            margin-bottom: 30px;
            position: relative;
            border: 2px dashed #eaddcf;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header-content { z-index: 1; }

        h1 {
            color: var(--accent);
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin: 0;
            font-weight: 800;
            line-height: 1.1;
        }

        .tagline {
            color: #a69080;
            font-style: italic;
            font-size: 1.1em;
            margin-top: 10px;
        }

        .auth-controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .profile-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .profile-container.show { display: flex; }

        .profile-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s;
            object-fit: cover;
        }

        .profile-img:hover { transform: scale(1.1) rotate(5deg); }

        @media (min-width: 768px) {
            header { padding: 60px 40px; flex-direction: row; justify-content: space-between; text-align: left; }
            .header-content { flex: 1; }
            .auth-controls { width: auto; }
            .profile-container { align-items: flex-end; }
        }

        /* --- BUTTONS --- */
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0px var(--primary-dark);
            white-space: nowrap;
        }

        button:hover { transform: translateY(-2px); background-color: var(--primary-light); box-shadow: 0 6px 0px var(--primary-dark); }
        button:active { transform: translateY(2px); box-shadow: 0 0px 0px var(--primary-dark); }

        .logout-btn { background-color: var(--danger); box-shadow: 0 3px 0px #c96a50; padding: 6px 14px; font-size: 12px; }

        /* --- FEATURE CARDS --- */
        .features-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .feature-card {
            background-color: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: var(--card-shadow);
            border: 1px solid #f0e6d8;
        }

        .mood-tracker {
            background: #fdf0d5; 
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            border: 2px dashed #f1dca7;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .mood-options {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .mood-btn {
            font-size: 24px;
            background: white;
            width: 55px;
            height: 55px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #e6d5b8;
        }

        #moodMotivation {
            font-size: 0.95rem;
            color: #8c7851;
            font-style: italic;
            min-height: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: rgba(255,255,255,0.4);
            border-radius: 15px;
        }

        .stats-panel {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(140, 120, 81, 0.2);
            text-align: left;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            font-size: 0.85rem;
        }

        .stat-bar-bg {
            flex: 1;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin: 0 10px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* --- HABIT PLANNER (NEW & UPDATED) --- */
        .planner-section {
            background: white;
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid #f0e6d8;
            text-align: center;
            box-shadow: var(--card-shadow);
        }

        .planner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .planner-container { flex-direction: row; align-items: flex-start; justify-content: center; }
        }

        .planner-img {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .habit-checklist-wrapper {
            flex: 1;
            max-width: 450px;
            text-align: left;
            background: #faf7f2;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #f3e9dc;
        }

        .habit-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }

        .habit-item {
            display: flex;
            align-items: center;
            background: white;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: transform 0.2s;
            border-left: 5px solid var(--primary);
        }

        .habit-item:hover { transform: translateX(5px); }

        .habit-item input[type="checkbox"] {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .habit-item span {
            flex: 1;
            font-weight: 600;
            color: var(--text);
        }

        .habit-item.completed span {
            text-decoration: line-through;
            color: #b5c49c;
        }

        .delete-habit {
            background: none;
            box-shadow: none;
            color: #ccc;
            padding: 5px;
            font-size: 18px;
        }

        .delete-habit:hover {
            color: var(--danger);
            background: none;
            box-shadow: none;
            transform: scale(1.2);
        }

        .add-habit-form {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .add-habit-form input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 15px;
            font-family: inherit;
        }

        .add-habit-form input:focus {
            outline: none;
            border-color: var(--primary-light);
        }

        .add-habit-btn {
            padding: 12px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* --- MODALS --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(93, 87, 79, 0.6);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #fff;
            margin: 10vh auto;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            border-radius: 30px;
            border: 6px solid var(--header-bg);
            box-sizing: border-box;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 18px 0;
            border: 2px solid #f0e6d8;
            border-radius: 15px;
            box-sizing: border-box;
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Connect Space</h1>
                <p class="tagline">Your cute pathway to wellness ✨</p>
            </div>

            <div class="auth-controls">
                <div class="auth-buttons" id="authButtonsContainer">
                    <button onclick="openModal('signinModal')">Sign In</button>
                    <button onclick="openModal('signupModal')">Sign Up</button>
                </div>

                <div class="profile-container" id="profileBtn">
                    <img src="https://cms-assets.tutsplus.com/cdn-cgi/image/width=360/uploads/users/107/posts/109117/image-upload/24_Totoro_ellipse_nails.jpg" 
                         alt="Profile" class="profile-img" onclick="window.location.href='profile.html'">
                    <button class="logout-btn" onclick="handleLogout()">Log Out</button>
                </div>
            </div>
        </header>

        <div class="features-section">
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="feature-card"><button style="width:100%;" onclick="window.location.href='story.html'">📝 Share Your Story</button></div>
                <div class="feature-card"><button style="width:100%;" onclick="window.location.href='articles.html'">📚 Explore Articles</button></div>
                <div class="feature-card"><button style="width:100%;" onclick="window.location.href='community.html'">🫂 Join Community</button></div>
            </div>

            <div class="mood-tracker">
                <h3 style="margin:0;">How are you, Bestie?</h3>
                <div class="mood-options">
                    <button class="mood-btn" onclick="updateMood('happy')">😊</button>
                    <button class="mood-btn" onclick="updateMood('neutral')">😐</button>
                    <button class="mood-btn" onclick="updateMood('sad')">😔</button>
                    <button class="mood-btn" onclick="updateMood('stressed')">😤</button>
                </div>
                
                <div id="moodResult" style="font-weight:800; color:#bc6c25; min-height: 1.5em;">Tap an emoji!</div>
                <div id="moodMotivation">Your energy matters. Pick how you feel to see a little note from me! 🌸</div>

                <div class="stats-panel">
                    <strong style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Weekly Vibe Stats</strong>
                    <div id="statsContainer"></div>
                </div>
            </div>
        </div>

        <div class="planner-section">
            <h2 style="color: var(--accent); margin-bottom: 30px;">Daily Glow-Up Habits ✨</h2>
            <div class="planner-container">
                <img src="https://www.makerstations.io/content/images/2022/03/olja-lobkis-studygram-04.jpeg" class="planner-img" alt="Planner">
                
                <div class="habit-checklist-wrapper">
                    <h4 style="margin: 0 0 10px 0;">My Checklist</h4>
                    <p style="font-size: 0.85rem; color: #a69080; margin: 0;">Check off your habits as you complete them!</p>
                    
                    <ul class="habit-list" id="habitList">
                        <!-- Habits will be injected here -->
                    </ul>

                    <form class="add-habit-form" onsubmit="handleAddHabit(event)">
                        <input type="text" id="habitInput" placeholder="Add a new goal..." maxlength="30" required>
                        <button type="submit" class="add-habit-btn">+</button>
                    </form>
                    
                    <div style="margin-top:20px; text-align: center;">
                        <button style="font-size: 13px; padding: 10px 20px;" onclick="setReminders()">🔔 Set Reminders</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals (Sign In/Up) -->
    <div id="signinModal" class="modal"><div class="modal-content"><span style="float:right; cursor:pointer;" onclick="closeModal('signinModal')">&times;</span><h3>Welcome Back! ☁️</h3><form onsubmit="event.preventDefault(); handleLogin();"><label>Email</label><input type="email" required><label>Password</label><input type="password" required><button type="submit" style="width:100%;">Let's Go!</button></form></div></div>
    <div id="signupModal" class="modal"><div class="modal-content"><span style="float:right; cursor:pointer;" onclick="closeModal('signupModal')">&times;</span><h3>Join the Club! 🌸</h3><form onsubmit="event.preventDefault(); handleLogin();"><label>Username</label><input type="text" required><label>Email</label><input type="email" required><label>Password</label><input type="password" required><button type="submit" style="width:100%;">Create Account</button></form></div></div>

    <script>
        // --- MOOD LOGIC ---
        const moodInfo = {
            happy: { label: "Happy", emoji: "😊", note: "Keep that sunshine glowing! Your smile is contagious, bestie. ✨", color: "#ffc300" },
            neutral: { label: "Neutral", emoji: "😐", note: "It's okay to just exist today. Finding peace in the middle is a superpower. ☁️", color: "#a3b18a" },
            sad: { label: "Sad", emoji: "😔", note: "Sending you the biggest virtual hug. It's okay to not be okay. Rest your heart. 🌸", color: "#4a90e2" },
            stressed: { label: "Stressed", emoji: "😤", note: "Breathe in... breathe out. You've handled 100% of your bad days so far. You got this! 🌿", color: "#e07a5f" }
        };

        let moodStats = JSON.parse(localStorage.getItem('moodStats')) || { happy: 0, neutral: 0, sad: 0, stressed: 0 };

        function updateMood(key) {
            const mood = moodInfo[key];
            moodStats[key]++;
            localStorage.setItem('moodStats', JSON.stringify(moodStats));
            document.getElementById('moodResult').textContent = `Current Vibe: ${mood.label} ${mood.emoji}`;
            document.getElementById('moodMotivation').textContent = mood.note;
            renderStats();
        }

        function renderStats() {
            const container = document.getElementById('statsContainer');
            const total = Object.values(moodStats).reduce((a, b) => a + b, 0) || 1;
            container.innerHTML = Object.entries(moodInfo).map(([key, info]) => {
                const count = moodStats[key];
                const percent = Math.round((count / total) * 100);
                return `
                    <div class="stat-row">
                        <span>${info.emoji}</span>
                        <div class="stat-bar-bg">
                            <div class="stat-bar-fill" style="width: ${percent}%; background: ${info.color}"></div>
                        </div>
                        <span style="font-weight:800; min-width:30px;">${percent}%</span>
                    </div>
                `;
            }).join('');
        }

        // --- HABIT CHECKLIST LOGIC ---
        let habits = JSON.parse(localStorage.getItem('habits')) || [
            { text: "Drink water 💧", completed: false },
            { text: "Stretch 🌸", completed: false },
            { text: "Meditate 🧘", completed: false }
        ];

        function handleAddHabit(e) {
            e.preventDefault();
            const input = document.getElementById('habitInput');
            const text = input.value.trim();
            if (text) {
                habits.push({ text, completed: false });
                input.value = '';
                saveAndRenderHabits();
            }
        }

        function toggleHabit(index) {
            habits[index].completed = !habits[index].completed;
            saveAndRenderHabits();
        }

        function deleteHabit(index) {
            habits.splice(index, 1);
            saveAndRenderHabits();
        }

        function saveAndRenderHabits() {
            localStorage.setItem('habits', JSON.stringify(habits));
            renderHabits();
        }

        function renderHabits() {
            const list = document.getElementById('habitList');
            list.innerHTML = habits.map((habit, index) => `
                <li class="habit-item ${habit.completed ? 'completed' : ''}">
                    <input type="checkbox" ${habit.completed ? 'checked' : ''} onchange="toggleHabit(${index})">
                    <span>${habit.text}</span>
                    <button class="delete-habit" onclick="deleteHabit(${index})">&times;</button>
                </li>
            `).join('');
        }

        function setReminders() {
            const customMsg = document.createElement('div');
            customMsg.style = "position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 15px 30px; border-radius: 50px; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.2);";
            customMsg.textContent = "Reminders set for your glow-up! 🌿";
            document.body.appendChild(customMsg);
            setTimeout(() => customMsg.remove(), 3000);
        }

        // --- AUTH & INITIALIZATION ---
        function handleLogin() { localStorage.setItem('isLoggedIn', 'true'); location.reload(); }
        function handleLogout() { localStorage.removeItem('isLoggedIn'); location.reload(); }
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        window.onload = function() {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('authButtonsContainer').style.display = 'none';
                document.getElementById('profileBtn').classList.add('show');
            }
            renderStats();
            renderHabits();
        };

        window.onclick = e => { if (e.target.className === 'modal') e.target.style.display = "none"; };
    </script>
</body>
</html>
